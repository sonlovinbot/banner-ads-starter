<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BannerClone Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['"IBM Plex Sans"', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'],
              mono: ['"JetBrains Mono"', 'monospace'],
            },
            colors: {
              // Semantic tokens backed by CSS variables (see <style> below)
              canvas: 'var(--bg-canvas)',
              surface: 'var(--bg-surface)',
              raised: 'var(--bg-raised)',
              'raised-2': 'var(--bg-raised-2)',
              fg: 'var(--fg-default)',
              muted: 'var(--fg-muted)',
              subtle: 'var(--fg-subtle)',
              line: 'var(--border-line)',
              'line-strong': 'var(--border-strong)',
              // Brand
              brand: {
                DEFAULT: '#F67D1C',
                light: '#FFA85C',
                dark: '#D9650A',
                50: '#FFF5EC',
                100: '#FFE3CA',
              },
              accent: {
                blue: '#2563EB',
                green: '#16A34A',
                yellow: '#FACC15',
              },
              // Legacy palette retained for compat — slowly migrate to tokens
              gray: {
                950: '#020617',
                900: '#0f172a',
                800: '#1e293b',
                700: '#334155',
              }
            },
            boxShadow: {
              'pop': '4px 4px 0 0 rgba(0,0,0,0.85)',
              'pop-lg': '6px 6px 0 0 rgba(0,0,0,0.85)',
            },
          }
        }
      }
    </script>
    <style>
      :root, .light {
        --bg-canvas:    #FFFFFF;
        --bg-surface:   #F8F9FB;
        --bg-raised:    #F1F3F7;
        --bg-raised-2:  #E5E8EE;
        --fg-default:   #1F2937;
        --fg-muted:     #4B5563;
        --fg-subtle:    #9CA3AF;
        --border-line:   #E5E7EB;
        --border-strong: #D1D5DB;
        --scroll-track:  #F1F3F7;
        --scroll-thumb:  #CBD5E1;
        --scroll-thumb-hover: #94A3B8;
      }
      .dark {
        --bg-canvas:    #020617;
        --bg-surface:   #0f172a;
        --bg-raised:    #1e293b;
        --bg-raised-2:  #334155;
        --fg-default:   #E2E8F0;
        --fg-muted:     #94A3B8;
        --fg-subtle:    #64748B;
        --border-line:   #1e293b;
        --border-strong: #334155;
        --scroll-track: #0f172a;
        --scroll-thumb: #334155;
        --scroll-thumb-hover: #475569;
      }
      html, body { font-family: "IBM Plex Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      body { background-color: var(--bg-canvas); color: var(--fg-default); }

      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: var(--scroll-track); }
      ::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--scroll-thumb-hover); }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.31.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.556.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "@supabase/supabase-js": "https://aistudiocdn.com/@supabase/supabase-js@^2.108.2"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-canvas text-fg min-h-screen">
    <div id="root" class="min-h-screen"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
